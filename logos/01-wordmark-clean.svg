<?xml version="1.0" encoding="UTF-8"?>
<!-- Global Pilot — Concept 01: Wordmark clean
     Simple two-word lockup in a modern sans. Most versatile.
     Works on any background, scales infinitely. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 96" preserveAspectRatio="xMidYMid meet">
  <text x="0" y="64"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="56"
        font-weight="500"
        letter-spacing="-0.5"
        fill="#1a1a1a">Global</text>
  <text x="195" y="64"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="56"
        font-weight="700"
        letter-spacing="-0.5"
        fill="#1a1a1a"> Pilot</text>
</svg>
