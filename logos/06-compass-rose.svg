<?xml version="1.0" encoding="UTF-8"?>
<!-- Global Pilot — Concept 06: 8-point compass rose + wordmark
     Compass-star icon with a longer north arm picked out in accent.
     Aviation-traditional iconography paired with a modern wordmark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" preserveAspectRatio="xMidYMid meet">
  <!-- Compass rose -->
  <g transform="translate(70, 70)">
    <!-- Outer circle ring -->
    <circle cx="0" cy="0" r="54" fill="none" stroke="#2a5d8a" stroke-width="2.5"/>
    <!-- 8-point star: 4 long arms (N/E/S/W) + 4 short arms diagonals -->
    <!-- North arm (accent, longer) -->
    <polygon points="0,-50 -7,0 7,0" fill="#2a5d8a"/>
    <!-- South arm -->
    <polygon points="0,50 -7,0 7,0" fill="#1a1a1a"/>
    <!-- East arm -->
    <polygon points="50,0 0,-7 0,7" fill="#1a1a1a"/>
    <!-- West arm -->
    <polygon points="-50,0 0,-7 0,7" fill="#1a1a1a"/>
    <!-- Diagonal short arms -->
    <polygon points="32,-32 -3,3 3,-3" fill="#1a1a1a" opacity="0.5"/>
    <polygon points="32,32  -3,-3 3,3" fill="#1a1a1a" opacity="0.5"/>
    <polygon points="-32,32  3,-3 -3,3" fill="#1a1a1a" opacity="0.5"/>
    <polygon points="-32,-32 3,3 -3,-3" fill="#1a1a1a" opacity="0.5"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3.5" fill="#2a5d8a"/>
    <!-- N label outside -->
    <text x="0" y="-62" text-anchor="middle"
          font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
          font-size="13" font-weight="700" fill="#2a5d8a" letter-spacing="0.5">N</text>
  </g>
  <!-- Wordmark -->
  <text x="160" y="86"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="52"
        font-weight="600"
        letter-spacing="-0.5"
        fill="#1a1a1a">Global</text>
  <text x="340" y="86"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="52"
        font-weight="600"
        letter-spacing="-0.5"
        fill="#2a5d8a"> Pilot</text>
</svg>
