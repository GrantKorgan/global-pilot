name: Refresh airports-food (FAA NASR)

# Runs on the first of every month. NASR is updated every 28 days; monthly
# is plenty for "food on field" — the flag rarely changes.
#
# Also runnable on-demand via the Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: "0 9 1 * *"   # 09:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run NASR importer
        run: node scripts/import-nasr.mjs
        env:
          NODE_OPTIONS: --no-warnings

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/data/airports-food.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with updates
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data: monthly FAA NASR refresh of airports-food.js"
          title: "Monthly FAA NASR refresh"
          body: |
            Auto-generated by `.github/workflows/refresh-airports.yml`.

            Updates `src/data/airports-food.js` from the latest FAA NASR
            subscriber files. Curated entries are preserved — auto-imported
            rows only fill ICAOs not already covered by CAFES or by an
            existing curated entry.

            Review the diff for sanity (sudden +500 or -500 rows is a red
            flag — usually means NASR's column layout changed and we need
            to re-verify offsets in `scripts/import-nasr.mjs`).
          branch: nasr-refresh
          delete-branch: true
